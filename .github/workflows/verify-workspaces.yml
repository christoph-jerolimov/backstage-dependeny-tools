name: Verify workspaces

on:
  workflow_dispatch:
  pull_request:
  schedule:
    # Every morning at 04:17 UTC, one hour after the update-manifests workflow
    - cron: '17 4 * * *'

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.repository }} / ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repository: backstage/community-plugins
            workspace: acr
          - repository: backstage/community-plugins
            workspace: analytics
          - repository: backstage/community-plugins
            workspace: argocd
          - repository: backstage/community-plugins
            workspace: bookmarks
          - repository: backstage/community-plugins
            workspace: jfrog-artifactory
          - repository: backstage/community-plugins
            workspace: mcp-chat
          - repository: backstage/community-plugins
            workspace: multi-source-security-viewer
          - repository: backstage/community-plugins
            workspace: nexus-repository-manager
          - repository: backstage/community-plugins
            workspace: npm
          - repository: backstage/community-plugins
            workspace: ocm
          - repository: backstage/community-plugins
            workspace: quay
          - repository: backstage/community-plugins
            workspace: rbac
          - repository: backstage/community-plugins
            workspace: servicenow
          - repository: backstage/community-plugins
            workspace: tekton
          - repository: backstage/community-plugins
            workspace: topology
          - repository: redhat-developer/rhdh-plugins
            workspace: adoption-insights
          - repository: redhat-developer/rhdh-plugins
            workspace: app-defaults
          - repository: redhat-developer/rhdh-plugins
            workspace: bulk-import
          - repository: redhat-developer/rhdh-plugins
            workspace: extensions
          - repository: redhat-developer/rhdh-plugins
            workspace: global-header
          - repository: redhat-developer/rhdh-plugins
            workspace: homepage
          - repository: redhat-developer/rhdh-plugins
            workspace: intelligent-assistant
          - repository: redhat-developer/rhdh-plugins
            workspace: orchestrator
          - repository: redhat-developer/rhdh-plugins
            workspace: quickstart
          - repository: redhat-developer/rhdh-plugins
            workspace: scorecard
          - repository: redhat-developer/rhdh-plugins
            workspace: theme
          - repository: redhat-developer/rhdh-plugins
            workspace: translations
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout ${{ matrix.repository }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          path: .clones/${{ matrix.repository }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify versions
        run: yarn verify-versions .clones/${{ matrix.repository }}/workspaces/${{ matrix.workspace }}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Print number of successful and failed checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusions=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name != "Summary") | .conclusion')
          successful=$(grep -c '^success$' <<< "$conclusions" || true)
          failed=$(grep -c '^failure$' <<< "$conclusions" || true)
          {
            echo "Successful checks: $successful"
            echo "Failed checks: $failed"
          } | tee "$GITHUB_STEP_SUMMARY"
